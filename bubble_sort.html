<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>氣泡排序法 - 程式對照進階版</title>
  <style>
    :root {
      --bg-color: #1a1a2e;
      --card-bg: #16213e;
      --primary: #4ecca3; /* 綠色: 已排序 */
      --secondary: #3498db; /* 藍色: 預設 */
      --accent: #f7d106; /* 黃色: 比較中 */
      --danger: #ff4d4d; /* 紅色: 交換中 */
      --text: #e0e0e0;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-color);
      color: var(--text);
      margin: 0; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
    }
    .container { width: 95%; max-width: 900px; }
    
    .status-panel {
      background: var(--card-bg);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex; justify-content: space-around;
      border-bottom: 3px solid var(--secondary);
      font-weight: bold;
    }

    .visual-section {
      background: #0f3460;
      border-radius: 15px;
      padding: 30px 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .array-container {
      display: flex; justify-content: center; align-items: flex-end;
      height: 220px; gap: 8px;
    }
    .bar {
      width: 35px; background: var(--secondary);
      border-radius: 5px 5px 2px 2px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; justify-content: center; align-items: flex-start;
      padding-top: 5px; color: #1a1a2e; font-size: 12px; font-weight: bold;
    }
    .bar.sorted { background: #1b1b2f !important; border: 1px solid var(--primary); color: var(--primary); opacity: 0.6; }
    .bar.comparing { background: var(--accent) !important; transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }
    .bar.swapping { background: var(--danger) !important; transform: scale(1.1); box-shadow: 0 0 20px var(--danger); }

    .code-section {
      background: #000; padding: 20px; border-radius: 12px;
      font-family: 'Consolas', monospace; font-size: 14px;
      line-height: 1.6; color: #a9b7c6;
      border-left: 4px solid var(--accent);
    }
    .code-line { padding: 0 10px; transition: 0.2s; border-radius: 4px; }
    .highlight { background: rgba(247, 209, 6, 0.2); color: #fff; transform: translateX(5px); }

    .controls { margin: 20px 0; display: flex; gap: 10px; justify-content: center; }
    button {
      padding: 10px 20px; border: none; border-radius: 8px;
      cursor: pointer; font-weight: bold; transition: 0.3s;
    }
    .btn-auto { background: var(--primary); color: white; }
    .btn-step { background: var(--secondary); color: white; }
    .btn-reset { background: #95a5a6; color: white; }
    button:hover { opacity: 0.8; transform: translateY(-2px); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .desc { text-align: center; margin-top: 10px; font-style: italic; color: var(--accent); height: 24px; }
  </style>
</head>
<body>

  <h1>氣泡排序法 (Bubble Sort)</h1>

  <div class="container">
    <div class="status-panel">
      <div>迴圈 i: <span id="stat-i">-</span></div>
      <div>當前索引 j: <span id="stat-j">-</span></div>
      <div>狀態: <span id="stat-op">準備中</span></div>
    </div>

    <div class="visual-section">
      <div class="array-container" id="container"></div>
      <div class="desc" id="desc">點擊按鈕開始演示</div>
    </div>

    <div class="code-section" id="code-box">
      <div class="code-line" id="line-0">for (let i = 0; i < n - 1; i++) {</div>
      <div class="code-line" id="line-1">&nbsp;&nbsp;for (let j = 0; j < n - i - 1; j++) {</div>
      <div class="code-line" id="line-2">&nbsp;&nbsp;&nbsp;&nbsp;if (array[j] > array[j + 1]) { // 比較相鄰元素</div>
      <div class="code-line" id="line-3">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;swap(array[j], array[j + 1]); // 大的往後換</div>
      <div class="code-line" id="line-4">&nbsp;&nbsp;&nbsp;&nbsp;}</div>
      <div class="code-line" id="line-5">&nbsp;&nbsp;}</div>
      <div class="code-line" id="line-6">}</div>
    </div>

    <div class="controls">
      <button class="btn-auto" id="start-btn">自動播放</button>
      <button class="btn-step" id="next-btn">下一步</button>
      <button class="btn-reset" id="reset-btn">重置隨機陣列</button>
    </div>
  </div>

  <script>
    let arr = [], i = 0, j = 0;
    let running = false, timer = null;
    let isSwapping = false;
    const n = 10;

    function init() {
      arr = Array.from({length: n}, () => Math.floor(Math.random() * 85) + 15);
      i = 0; j = 0; isSwapping = false;
      updateCode(-1);
      render();
      document.getElementById('desc').textContent = "請選擇「自動播放」或「下一步」";
      document.getElementById('stat-i').textContent = "-";
      document.getElementById('stat-j').textContent = "-";
      document.getElementById('stat-op').textContent = "等待中";
    }

    function render() {
      const container = document.getElementById('container');
      container.innerHTML = '';
      arr.forEach((val, idx) => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        
        // 判定顏色
        if (idx >= n - i) bar.classList.add('sorted');
        if (idx === j || idx === j + 1) {
          if (idx < n - i) {
             bar.classList.add(isSwapping ? 'swapping' : 'comparing');
          }
        }

        bar.style.height = `${val * 2}px`;
        bar.textContent = val;
        container.appendChild(bar);
      });
    }

    function updateCode(line) {
      document.querySelectorAll('.code-line').forEach(el => el.classList.remove('highlight'));
      if (line >= 0) document.getElementById(`line-${line}`).classList.add('highlight');
    }

    function step() {
      if (i >= n - 1) {
        i = n; render();
        updateCode(-1);
        document.getElementById('desc').textContent = "排序完成！";
        document.getElementById('stat-op').textContent = "完成";
        clearInterval(timer);
        return;
      }

      document.getElementById('stat-i').textContent = i;
      document.getElementById('stat-j').textContent = j;

      if (!isSwapping) {
        // 比較階段
        updateCode(2);
        document.getElementById('stat-op').textContent = "比較中";
        if (arr[j] > arr[j + 1]) {
          document.getElementById('desc').textContent = `檢查：${arr[j]} > ${arr[j+1]}，準備交換`;
          isSwapping = true;
        } else {
          document.getElementById('desc').textContent = `檢查：${arr[j]} <= ${arr[j+1]}，不需交換`;
          isSwapping = false;
          moveToNext();
        }
      } else {
        // 交換階段
        updateCode(3);
        document.getElementById('stat-op').textContent = "執行交換";
        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
        isSwapping = false;
        moveToNext();
      }
      render();
    }

    function moveToNext() {
      j++;
      if (j >= n - i - 1) {
        j = 0;
        i++;
      }
    }

    document.getElementById('start-btn').onclick = () => {
      if(running) return;
      running = true;
      timer = setInterval(step, 600);
    };

    document.getElementById('next-btn').onclick = () => {
      clearInterval(timer);
      running = false;
      step();
    };

    document.getElementById('reset-btn').onclick = () => {
      clearInterval(timer);
      running = false;
      init();
    };

    init();
  </script>
</body>
</html>
