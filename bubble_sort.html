<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>氣泡排序法 - 速度調控進階版</title>
  <style>
    :root {
      --bg-color: #1a1a2e;
      --card-bg: #16213e;
      --primary: #4ecca3;   /* 已排序 */
      --secondary: #3498db; /* 未排序 */
      --accent: #f7d106;    /* 比較中 */
      --danger: #ff4d4d;    /* 交換中 */
      --text: #e0e0e0;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-color);
      color: var(--text);
      margin: 0; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
    }
    .container { width: 95%; max-width: 900px; }
    
    /* 1. 顏色圖例 */
    .legend {
      display: flex; justify-content: center; gap: 20px;
      margin-bottom: 15px; background: var(--card-bg);
      padding: 10px; border-radius: 8px; font-size: 14px;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .box { width: 14px; height: 14px; border-radius: 3px; }

    .status-panel {
      background: var(--card-bg); padding: 15px; border-radius: 12px;
      margin-bottom: 20px; display: flex; justify-content: space-around;
      border-bottom: 3px solid var(--secondary); font-weight: bold;
    }

    .visual-section {
      background: #0f3460; border-radius: 15px; padding: 25px;
      margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .array-container {
      display: flex; justify-content: center; align-items: flex-end;
      height: 180px; gap: 8px;
    }
    .bar {
      width: 35px; background: var(--secondary); border-radius: 5px 5px 2px 2px;
      transition: all 0.2s ease; display: flex; justify-content: center;
      align-items: flex-start; padding-top: 5px; color: #1a1a2e;
      font-size: 12px; font-weight: bold;
    }
    .bar.sorted { background: #1b1b2f !important; border: 1px solid var(--primary); color: var(--primary); opacity: 0.6; }
    .bar.comparing { background: var(--accent) !important; transform: scale(1.1); }
    .bar.swapping { background: var(--danger) !important; transform: scale(1.1); box-shadow: 0 0 15px var(--danger); }

    /* 2. 速度拉桿樣式 */
    .speed-control {
      margin-bottom: 20px; display: flex; align-items: center;
      justify-content: center; gap: 15px; background: var(--card-bg);
      padding: 10px 20px; border-radius: 30px;
    }
    input[type=range] { cursor: pointer; width: 200px; }

    .code-section {
      background: #000; padding: 18px; border-radius: 12px;
      font-family: 'Consolas', monospace; font-size: 14px;
      line-height: 1.5; color: #a9b7c6; border-left: 4px solid var(--accent);
    }
    .code-line { padding: 0 10px; border-radius: 4px; }
    .highlight { background: rgba(247, 209, 6, 0.2); color: #fff; }

    .controls { margin: 20px 0; display: flex; gap: 10px; justify-content: center; }
    button {
      padding: 10px 20px; border: none; border-radius: 8px;
      cursor: pointer; font-weight: bold; transition: 0.2s; min-width: 90px;
    }
    .btn-start { background: var(--primary); color: white; }
    .btn-pause { background: #e67e22; color: white; }
    .btn-step { background: var(--secondary); color: white; }
    .btn-reset { background: #95a5a6; color: white; }
    .btn-home { background: #8e44ad; color: white; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    .desc { text-align: center; margin-top: 10px; font-style: italic; color: var(--accent); height: 20px; }
  </style>
</head>
<body>

  <h1>氣泡排序法 (Bubble Sort)</h1>

  <div class="container">
    <div class="legend">
      <div class="legend-item"><div class="box" style="background:var(--secondary)"></div>未排序</div>
      <div class="legend-item"><div class="box" style="background:var(--accent)"></div>比較中</div>
      <div class="legend-item"><div class="box" style="background:var(--danger)"></div>交換中</div>
      <div class="legend-item"><div class="box" style="border:1px solid var(--primary)"></div>已排序</div>
    </div>

    <div class="speed-control">
      <span>慢速</span>
      <input type="range" id="speed-slider" min="100" max="2000" step="100" value="600" dir="rtl">
      <span>快速</span>
      <span id="speed-val">(0.6s)</span>
    </div>

    <div class="status-panel">
      <div>迴圈 i: <span id="stat-i">-</span></div>
      <div>當前索引 j: <span id="stat-j">-</span></div>
      <div>狀態: <span id="stat-op">準備中</span></div>
    </div>

    <div class="visual-section">
      <div class="array-container" id="container"></div>
      <div class="desc" id="desc">點擊開始演示</div>
    </div>

    <div class="code-section">
      <div class="code-line" id="line-0">for (let i = 0; i < n - 1; i++) {</div>
      <div class="code-line" id="line-1">&nbsp;&nbsp;for (let j = 0; j < n - i - 1; j++) {</div>
      <div class="code-line" id="line-2">&nbsp;&nbsp;&nbsp;&nbsp;if (array[j] > array[j + 1]) {</div>
      <div class="code-line" id="line-3">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;swap(array[j], array[j + 1]);</div>
      <div class="code-line" id="line-4">&nbsp;&nbsp;&nbsp;&nbsp;}</div>
      <div class="code-line" id="line-5">&nbsp;&nbsp;}</div>
      <div class="code-line" id="line-6">}</div>
    </div>

    <div class="controls">
      <button class="btn-start" id="start-btn">自動開始</button>
      <button class="btn-pause" id="pause-btn" style="display:none;">暫停</button>
      <button class="btn-step" id="next-btn">下一步</button>
      <button class="btn-reset" id="reset-btn">重置</button>
      <button class="btn-home" onclick="window.location.href='index.html'">返回主頁</button>
    </div>
  </div>

  <script>
    let arr = [], i = 0, j = 0, n = 10;
    let timer = null, isSwapping = false;
    let speed = 600;

    const speedSlider = document.getElementById('speed-slider');
    const speedVal = document.getElementById('speed-val');

    function init() {
      arr = Array.from({length: n}, () => Math.floor(Math.random() * 80) + 20);
      i = 0; j = 0; isSwapping = false;
      stopAuto();
      render();
      updateCode(-1);
      document.getElementById('desc').textContent = "等待中...";
    }

    function render() {
      const container = document.getElementById('container');
      container.innerHTML = '';
      arr.forEach((val, idx) => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        if (idx >= n - i) bar.classList.add('sorted');
        if (idx === j || idx === j + 1) {
          if (idx < n - i) bar.classList.add(isSwapping ? 'swapping' : 'comparing');
        }
        bar.style.height = `${val * 2}px`;
        bar.textContent = val;
        container.appendChild(bar);
      });
    }

    function updateCode(line) {
      document.querySelectorAll('.code-line').forEach(el => el.classList.remove('highlight'));
      if (line >= 0) document.getElementById(`line-${line}`).classList.add('highlight');
    }

    function step() {
      if (i >= n - 1) {
        i = n; render();
        updateCode(-1);
        document.getElementById('desc').textContent = "排序完成！";
        stopAuto();
        return;
      }
      document.getElementById('stat-i').textContent = i;
      document.getElementById('stat-j').textContent = j;

      if (!isSwapping) {
        updateCode(2);
        if (arr[j] > arr[j + 1]) {
          document.getElementById('stat-op').textContent = "發現較大值";
          document.getElementById('desc').textContent = `${arr[j]} > ${arr[j+1]}，準備交換`;
          isSwapping = true;
        } else {
          document.getElementById('stat-op').textContent = "繼續掃描";
          document.getElementById('desc').textContent = `${arr[j]} <= ${arr[j+1]}，跳過`;
          isSwapping = false;
          moveToNext();
        }
      } else {
        updateCode(3);
        document.getElementById('stat-op').textContent = "執行交換";
        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
        isSwapping = false;
        moveToNext();
      }
      render();
    }

    function moveToNext() {
      j++;
      if (j >= n - i - 1) { j = 0; i++; }
    }

    // 自動與暫停控制
    function startAuto() {
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('pause-btn').style.display = 'inline-block';
      runTimer();
    }

    function runTimer() {
      if (timer) clearInterval(timer);
      timer = setInterval(step, speed);
    }

    function stopAuto() {
      document.getElementById('start-btn').style.display = 'inline-block';
      document.getElementById('pause-btn').style.display = 'none';
      clearInterval(timer);
      timer = null;
    }

    // 速度調整監聽
    speedSlider.oninput = function() {
      speed = parseInt(this.value);
      speedVal.textContent = `(${(speed/1000).toFixed(1)}s)`;
      if (timer) runTimer(); // 如果正在運行，即時套用新速度
    }

    document.getElementById('start-btn').onclick = startAuto;
    document.getElementById('pause-btn').onclick = stopAuto;
    document.getElementById('next-btn').onclick = () => { stopAuto(); step(); };
    document.getElementById('reset-btn').onclick = init;

    init();
  </script>
</body>
</html>
