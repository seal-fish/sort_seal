<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>插入排序法 - 速度調控進階版</title>
  <style>
    :root {
      --bg-color: #1a1a2e;
      --card-bg: #16213e;
      --primary: #4ecca3;
      --secondary: #3498db;
      --accent: #f7d106;
      --danger: #ff4d4d;
      --text: #e0e0e0;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-color);
      color: var(--text);
      margin: 0; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
    }
    .container { width: 95%; max-width: 900px; }
    .legend {
      display: flex; justify-content: center; gap: 20px;
      margin-bottom: 15px; background: var(--card-bg);
      padding: 10px; border-radius: 8px; font-size: 14px;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .box { width: 14px; height: 14px; border-radius: 3px; }
    .speed-control {
      margin-bottom: 20px; display: flex; align-items: center;
      justify-content: center; gap: 15px; background: var(--card-bg);
      padding: 10px 20px; border-radius: 30px;
    }
    input[type=range] { cursor: pointer; width: 200px; }
    .status-panel {
      background: var(--card-bg); padding: 15px; border-radius: 12px;
      margin-bottom: 20px; display: flex; justify-content: space-around;
      border-bottom: 3px solid var(--primary); font-weight: bold;
    }
    .visual-section {
      background: #0f3460; border-radius: 15px; padding: 25px;
      margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .array-container {
      display: flex; justify-content: center; align-items: flex-end;
      height: 180px; gap: 8px;
    }
    .bar {
      width: 35px; background: var(--secondary); border-radius: 5px 5px 2px 2px;
      transition: all .2s ease; display: flex; justify-content: center;
      align-items: flex-start; padding-top: 5px; color: #1a1a2e;
      font-size: 12px; font-weight: bold;
    }
    .bar.sorted { background: #1b1b2f !important; border: 1px solid var(--primary); color: var(--primary); opacity: .6;}
    .bar.comparing { background: var(--accent) !important; transform: scale(1.1); }
    .bar.shifting { background: var(--danger) !important; transform: scale(1.1); box-shadow: 0 0 15px var(--danger); }
    .code-section {
      background: #000; padding: 18px; border-radius: 12px;
      font-family: 'Consolas', monospace; font-size: 14px;
      line-height: 1.5; color: #a9b7c6; border-left: 4px solid var(--primary);
    }
    .code-line { padding: 0 10px; border-radius: 4px; }
    .highlight { background: rgba(78,204,163,.2); color: #fff; }
    .controls { margin: 20px 0; display: flex; gap: 10px; justify-content: center; }
    button { padding: 10px 20px; border: 0; border-radius: 8px; cursor: pointer; font-weight: bold; transition: .2s; min-width: 95px; }
    .btn-start { background: var(--primary); color: #fff; }
    .btn-pause { background: #e67e22; color: #fff; }
    .btn-step { background: var(--secondary); color: #fff; }
    .btn-reset { background: #95a5a6; color: #fff; }
    button:hover { opacity: .9; transform: translateY(-1px); }
    .desc { text-align:center; margin-top:10px; font-style: italic; color: var(--primary); height: 20px; }
    a { color: #a9b7c6; text-decoration: none; align-self: center; margin-left: 10px; }
  </style>
</head>
<body>
  <h1>插入排序法 (Insertion Sort)</h1>
  <div class="container">
    <div class="legend">
      <div class="legend-item"><div class="box" style="background:var(--secondary)"></div>尚未排序</div>
      <div class="legend-item"><div class="box" style="background:var(--accent)"></div>比較中</div>
      <div class="legend-item"><div class="box" style="background:var(--danger)"></div>移動位置</div>
      <div class="legend-item"><div class="box" style="border:1px solid var(--primary)"></div>已排序</div>
    </div>

    <div class="speed-control">
      <span>慢速</span>
      <input type="range" id="speed-slider" min="100" max="2000" step="100" value="600" dir="rtl">
      <span>快速</span>
      <span id="speed-val">(0.6s)</span>
    </div>

    <div class="status-panel">
      <div>i: <span id="stat-i">-</span></div>
      <div>j: <span id="stat-j">-</span></div>
      <div>狀態: <span id="stat-op">準備中</span></div>
    </div>

    <div class="visual-section">
      <div class="array-container" id="container"></div>
      <div class="desc" id="desc">按下開始按鈕</div>
    </div>

    <div class="code-section">
      <div class="code-line" id="line-0">for (let i = 1; i < n; i++) {</div>
      <div class="code-line" id="line-1">&nbsp;&nbsp;let key = array[i];</div>
      <div class="code-line" id="line-2">&nbsp;&nbsp;let j = i - 1;</div>
      <div class="code-line" id="line-3">&nbsp;&nbsp;while (j >= 0 && array[j] > key) {</div>
      <div class="code-line" id="line-4">&nbsp;&nbsp;&nbsp;&nbsp;array[j + 1] = array[j];</div>
      <div class="code-line" id="line-5">&nbsp;&nbsp;&nbsp;&nbsp;j--;</div>
      <div class="code-line" id="line-6">&nbsp;&nbsp;}</div>
      <div class="code-line" id="line-7">&nbsp;&nbsp;array[j + 1] = key;</div>
      <div class="code-line" id="line-8">}</div>
    </div>

    <div class="controls">
      <button class="btn-start" id="start-btn">自動開始</button>
      <button class="btn-pause" id="pause-btn" style="display:none;">暫停</button>
      <button class="btn-step" id="next-btn">下一步</button>
      <button class="btn-reset" id="reset-btn">重置</button>
      <a href="index.html">返回首頁</a>
    </div>
  </div>

  <script>
    let arr = [], n = 10, i = 1, j = 0, key = null;
    let phase = 'init', timer = null, speed = 600;
    function init() {
      arr = Array.from({length: n}, () => Math.floor(Math.random() * 80) + 20);
      i = 1; j = 0; key = null; phase = 'init'; stopAuto(); render(); updateCode(-1);
      document.getElementById('desc').textContent = '按下開始按鈕';
      document.getElementById('stat-i').textContent = '-';
      document.getElementById('stat-j').textContent = '-';
      document.getElementById('stat-op').textContent = '準備中';
    }
    function render() {
      const c = document.getElementById('container'); c.innerHTML = '';
      arr.forEach((v, idx) => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        if (idx < i) bar.classList.add('sorted');
        if (idx === i) bar.classList.add('comparing');
        if (phase === 'scan' && idx === j) bar.classList.add('shifting');
        if (phase === 'insert' && idx === j + 1) bar.classList.add('shifting');
        bar.style.height = `${v * 2}px`; bar.textContent = v; c.appendChild(bar);
      });
    }
    function updateCode(line) {
      document.querySelectorAll('.code-line').forEach(el => el.classList.remove('highlight'));
      if (line >= 0) document.getElementById(`line-${line}`).classList.add('highlight');
    }
    function step() {
      if (i >= n) {
        document.getElementById('desc').textContent='排序完成！';
        document.getElementById('stat-op').textContent='完成'; stopAuto(); render(); return;
      }
      document.getElementById('stat-i').textContent=i;
      document.getElementById('stat-j').textContent=j;
      if (phase === 'init') {
        key = arr[i]; j = i-1;
        document.getElementById('stat-op').textContent = `key=${key} 開始比較`;
        document.getElementById('desc').textContent = `第 ${i+1} 輪：插入 ${key}`;
        updateCode(1); phase = 'scan';
      } else if (phase === 'scan') {
        if (j >= 0 && arr[j] > key) {
          updateCode(3);
          arr[j+1] = arr[j];
          document.getElementById('stat-op').textContent = `arr[${j}](${arr[j]}) > key`;
          document.getElementById('desc').textContent = `右移 arr[${j}]`;
          j--; phase = 'scan';
        } else {
          phase = 'insert';
        }
      } else if (phase === 'insert') {
        updateCode(7);
        arr[j+1] = key;
        document.getElementById('stat-op').textContent = `插入 key(${key}) 到 ${j+1}`;
        document.getElementById('desc').textContent = `插入完成`;
        i++; phase = 'init';
      }
      render();
    }
    function startAuto() { document.getElementById('start-btn').style.display='none'; document.getElementById('pause-btn').style.display='inline-block'; runTimer(); }
    function pauseAuto() { stopAuto(); }
    function runTimer() { if (timer) clearInterval(timer); timer = setInterval(step, speed); }
    function stopAuto() { if (timer) clearInterval(timer); timer = null; document.getElementById('start-btn').style.display='inline-block'; document.getElementById('pause-btn').style.display='none'; }
    document.getElementById('start-btn').addEventListener('click', startAuto);
    document.getElementById('pause-btn').addEventListener('click', pauseAuto);
    document.getElementById('next-btn').addEventListener('click', () => { stopAuto(); step(); });
    document.getElementById('reset-btn').addEventListener('click', init);
    document.getElementById('speed-slider').addEventListener('input', e => {
      speed = Number(e.target.value);
      document.getElementById('speed-val').textContent = `(${(speed/1000).toFixed(1)}s)`;
      if (timer) runTimer();
    });
    init();
  </script>
</body>
</html>
