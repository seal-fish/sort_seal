<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選擇排序法 - 速度調控進階版</title>
  <style>
    :root {
      --bg-color: #1a1a2e;
      --card-bg: #16213e;
      --primary: #4ecca3;   /* 綠色: 已排序完成 */
      --secondary: #3498db; /* 藍色: 未排序區 */
      --accent: #f7d106;    /* 黃色: 正在掃描 */
      --danger: #ff4d4d;    /* 紅色: 當前找到的最小值 */
      --text: #e0e0e0;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-color);
      color: var(--text);
      margin: 0; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
    }
    .container { width: 95%; max-width: 900px; }
    
    /* 顏色圖例 */
    .legend {
      display: flex; justify-content: center; gap: 20px;
      margin-bottom: 15px; background: var(--card-bg);
      padding: 10px; border-radius: 8px; font-size: 14px;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .box { width: 14px; height: 14px; border-radius: 3px; }

    /* 速度控制區 */
    .speed-control {
      margin-bottom: 20px; display: flex; align-items: center;
      justify-content: center; gap: 15px; background: var(--card-bg);
      padding: 10px 20px; border-radius: 30px;
    }
    input[type=range] { cursor: pointer; width: 200px; }

    .status-panel {
      background: var(--card-bg); padding: 15px; border-radius: 12px;
      margin-bottom: 20px; display: flex; justify-content: space-around;
      border-bottom: 3px solid var(--primary); font-weight: bold;
    }

    .visual-section {
      background: #0f3460; border-radius: 15px; padding: 25px;
      margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .array-container {
      display: flex; justify-content: center; align-items: flex-end;
      height: 180px; gap: 8px;
    }
    .bar {
      width: 35px; background: var(--secondary); border-radius: 5px 5px 2px 2px;
      transition: all 0.2s ease; display: flex; justify-content: center;
      align-items: flex-start; padding-top: 5px; color: #1a1a2e;
      font-size: 12px; font-weight: bold;
    }
    /* 狀態顏色定義 */
    .bar.sorted { background: #1b1b2f !important; border: 1px solid var(--primary); color: var(--primary); opacity: 0.6; }
    .bar.scanning { background: var(--accent) !important; transform: scale(1.1); }
    .bar.is-min { background: var(--danger) !important; transform: scale(1.1); box-shadow: 0 0 15px var(--danger); }

    .code-section {
      background: #000; padding: 18px; border-radius: 12px;
      font-family: 'Consolas', monospace; font-size: 14px;
      line-height: 1.5; color: #a9b7c6; border-left: 4px solid var(--primary);
    }
    .code-line { padding: 0 10px; border-radius: 4px; transition: 0.2s; }
    .highlight { background: rgba(78, 204, 163, 0.2); color: #fff; }

    .controls { margin: 20px 0; display: flex; gap: 10px; justify-content: center; }
    button {
      padding: 10px 20px; border: none; border-radius: 8px;
      cursor: pointer; font-weight: bold; transition: 0.2s; min-width: 95px;
    }
    .btn-start { background: var(--primary); color: white; }
    .btn-pause { background: #e67e22; color: white; }
    .btn-step { background: var(--secondary); color: white; }
    .btn-reset { background: #95a5a6; color: white; }
    .btn-home { background: #8e44ad; color: white; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }

    .desc { text-align: center; margin-top: 10px; font-style: italic; color: var(--primary); height: 20px; }
  </style>
</head>
<body>

  <h1>選擇排序法 (Selection Sort)</h1>

  <div class="container">
    <div class="legend">
      <div class="legend-item"><div class="box" style="background:var(--secondary)"></div>未排序區</div>
      <div class="legend-item"><div class="box" style="background:var(--accent)"></div>正在掃描</div>
      <div class="legend-item"><div class="box" style="background:var(--danger)"></div>目前最小值</div>
      <div class="legend-item"><div class="box" style="border:1px solid var(--primary)"></div>已排序完成</div>
    </div>

    <div class="speed-control">
      <span>慢速</span>
      <input type="range" id="speed-slider" min="100" max="2000" step="100" value="600" dir="rtl">
      <span>快速</span>
      <span id="speed-val">(0.6s)</span>
    </div>

    <div class="status-panel">
      <div>當前輪次: <span id="stat-round">-</span></div>
      <div>當前最小值: <span id="stat-min">-</span></div>
      <div>操作: <span id="stat-op">準備中</span></div>
    </div>

    <div class="visual-section">
      <div class="array-container" id="container"></div>
      <div class="desc" id="desc">點擊按鈕開始</div>
    </div>

    <div class="code-section">
      <div class="code-line" id="line-0">for (let i = 0; i < n - 1; i++) {</div>
      <div class="code-line" id="line-1">&nbsp;&nbsp;let minIdx = i;</div>
      <div class="code-line" id="line-2">&nbsp;&nbsp;for (let j = i + 1; j < n; j++) {</div>
      <div class="code-line" id="line-3">&nbsp;&nbsp;&nbsp;&nbsp;if (array[j] < array[minIdx]) minIdx = j;</div>
      <div class="code-line" id="line-4">&nbsp;&nbsp;}</div>
      <div class="code-line" id="line-5">&nbsp;&nbsp;[array[i], array[minIdx]] = [array[minIdx], array[i]];</div>
      <div class="code-line" id="line-6">}</div>
    </div>

    <div class="controls">
      <button class="btn-start" id="start-btn">自動開始</button>
      <button class="btn-pause" id="pause-btn" style="display:none;">暫停</button>
      <button class="btn-step" id="next-btn">下一步</button>
      <button class="btn-reset" id="reset-btn">重置</button>
      <button class="btn-home" onclick="window.location.href='index.html'">返回主頁</button>
    </div>
  </div>

  <script>
    let arr = [], i = 0, j = -1, minIdx = 0, n = 10;
    let timer = null, speed = 600;
    let stepPhase = 'init'; // 階段：init, scan, swap

    const speedSlider = document.getElementById('speed-slider');
    const speedVal = document.getElementById('speed-val');

    function init() {
      arr = Array.from({length: n}, () => Math.floor(Math.random() * 80) + 20);
      i = 0; j = -1; minIdx = 0; stepPhase = 'init';
      stopAuto();
      render();
      updateCode(-1);
      document.getElementById('desc').textContent = "等待操作...";
      document.getElementById('stat-round').textContent = "-";
      document.getElementById('stat-min').textContent = "-";
      document.getElementById('stat-op').textContent = "準備中";
    }

    function render() {
      const container = document.getElementById('container');
      container.innerHTML = '';
      arr.forEach((val, idx) => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        if (idx < i) bar.classList.add('sorted');
        if (idx === j) bar.classList.add('scanning');
        if (idx === minIdx && i < n) bar.classList.add('is-min');
        bar.style.height = `${val * 2}px`;
        bar.textContent = val;
        container.appendChild(bar);
      });
    }

    function updateCode(line) {
      document.querySelectorAll('.code-line').forEach(el => el.classList.remove('highlight'));
      if (line >= 0) document.getElementById(`line-${line}`).classList.add('highlight');
    }

    function step() {
      if (i >= n - 1) {
        i = n; render();
        updateCode(-1);
        document.getElementById('desc').textContent = "全部排序完成！";
        document.getElementById('stat-op').textContent = "完成";
        stopAuto();
        return;
      }

      if (stepPhase === 'init') {
        minIdx = i;
        j = i + 1;
        updateCode(1);
        document.getElementById('stat-round').textContent = i + 1;
        document.getElementById('stat-min').textContent = arr[minIdx];
        document.getElementById('stat-op').textContent = "初始化最小值";
        document.getElementById('desc').textContent = `第 ${i+1} 輪：假設 ${arr[i]} 為最小值`;
        stepPhase = 'scan';
      } else if (stepPhase === 'scan') {
        if (j < n) {
          updateCode(3);
          document.getElementById('stat-op').textContent = "掃描比較中";
          if (arr[j] < arr[minIdx]) {
            minIdx = j;
            document.getElementById('desc').textContent = `發現更小值：${arr[minIdx]}！更新索引`;
            document.getElementById('stat-min').textContent = arr[minIdx];
          } else {
            document.getElementById('desc').textContent = `檢查 ${arr[j]}，未小於 ${arr[minIdx]}`;
          }
          j++;
        } else {
          stepPhase = 'swap';
          step(); // 掃描完立刻進入交換說明
        }
      } else if (stepPhase === 'swap') {
        updateCode(5);
        document.getElementById('stat-op').textContent = "執行交換";
        document.getElementById('desc').textContent = `將首位 ${arr[i]} 與最小值 ${arr[minIdx]} 交換`;
        [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
        i++;
        j = -1;
        stepPhase = 'init';
      }
      render();
    }

    // 自動與暫停控制
    function startAuto() {
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('pause-btn').style.display = 'inline-block';
      runTimer();
    }

    function runTimer() {
      if (timer) clearInterval(timer);
      timer = setInterval(step, speed);
    }

    function stopAuto() {
      document.getElementById('start-btn').style.display = 'inline-block';
      document.getElementById('pause-btn').style.display = 'none';
      clearInterval(timer);
      timer = null;
    }

    speedSlider.oninput = function() {
      speed = parseInt(this.value);
      speedVal.textContent = `(${(speed/1000).toFixed(1)}s)`;
      if (timer) runTimer();
    }

    document.getElementById('start-btn').onclick = startAuto;
    document.getElementById('pause-btn').onclick = stopAuto;
    document.getElementById('next-btn').onclick = () => { stopAuto(); step(); };
    document.getElementById('reset-btn').onclick = init;

    init();
  </script>
</body>
</html>
